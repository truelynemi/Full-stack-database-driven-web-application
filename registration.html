<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form id="signupForm" method="post">
    {{ form.hidden_tag() }}  <!-- CSRF Token -->

    <div class="grid-2">
        <div>
            <label for="firstName">First name</label>
            {{ form.first_name() }} <!-- Flask-WTF handles rendering the field -->
        </div>
        <div>
            <label for="lastName">Last name</label>
            {{ form.last_name() }} <!-- Flask-WTF handles rendering the field -->
        </div>
    </div>

    <label for="signupEmail">Email address</label>
    {{ form.email() }} <!-- Flask-WTF handles rendering the field -->

    <label for="signupPassword">Password</label>
    {{ form.password() }} <!-- Flask-WTF handles rendering the field -->

    <label for="signupConfirmPassword">Confirm password</label>
    {{ form.confirm_password() }} <!-- Flask-WTF handles rendering the field -->

    <label for="agree_terms">
        {{ form.agree_terms() }} I agree to the Terms & Conditions <!-- Flask-WTF handles rendering the field -->
    </label>

    <button type="submit" class="btn btn-primary auth-btn">
        Sign up
    </button>

    <p class="auth-meta">
        Already have an account? 
        <a href="{{ url_for('login') }}">Log in</a>
    </p>
</form>

<!-- JavaScript for password validation -->
<script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        let password = document.getElementById('password').value;
        let confirmPassword = document.getElementById('confirm_password').value;
        let passwordError = '';
        
        // Check if password meets criteria
        if (password.length < 8) {
            passwordError = 'Password must be at least 8 characters long.';
        } else if (!/\d/.test(password)) {
            passwordError = 'Password must contain at least one number.';
        } else if (!/[A-Z]/.test(password)) {
            passwordError = 'Password must contain at least one uppercase letter.';
        }

        // Check if passwords match
        if (password !== confirmPassword) {
            passwordError = 'Passwords do not match.';
        }

        // If there's an error, prevent form submission and show the error message
        if (passwordError) {
            e.preventDefault();  // Prevent form submission
            alert(passwordError);  // Show the error
        }
    });
</script>

</body>
</html>
