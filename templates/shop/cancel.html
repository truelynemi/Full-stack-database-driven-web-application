<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled — Shop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shop.css') }}">
</head>
<body>

<!-- ── Navigation ── -->
<nav class="navbar">
    <a href="{{ url_for('main.user_dashboard') }}" class="navbar-brand">MyApp</a>
    <ul class="navbar-links">
        <li><a href="{{ url_for('main.user_dashboard') }}">Dashboard</a></li>
        <li><a href="{{ url_for('shop.catalogue') }}">Shop</a></li>
        <li><a href="{{ url_for('shop.orders') }}">My Orders</a></li>
        <li>
            <a href="{{ url_for('shop.cart') }}" class="cart-link">
                🛒 Cart
                {% if cart_count > 0 %}
                <span class="cart-badge">{{ cart_count }}</span>
                {% endif %}
            </a>
        </li>
        <li><a href="{{ url_for('auth.logout') }}">Log out</a></li>
    </ul>
</nav>

<div class="container">
    <div class="result-card">
        <div class="result-icon">❌</div>
        <h1>Payment Cancelled</h1>
        <p>No payment was taken. Your cart is still saved.</p>
        <p style="margin-bottom:32px;">You can return to your cart and try again whenever you're ready.</p>

        <div class="result-card-actions">
            <a href="{{ url_for('shop.cart') }}" class="btn btn-primary">Return to Cart</a>
            <a href="{{ url_for('shop.catalogue') }}" class="btn btn-secondary">Continue Shopping</a>
        </div>
    </div>
</div>

</body>
</html>
