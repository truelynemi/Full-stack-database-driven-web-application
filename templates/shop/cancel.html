{% extends 'shop/base_shop.html' %}

{% block title %}Payment Cancelled — Shop{% endblock %}

{% block content %}
<div class="container">
    <div class="result-card">
        <div class="result-icon">❌</div>
        <h1>Payment Cancelled</h1>
        <p>No payment was taken. Your cart is still saved.</p>
        <p style="margin-bottom:32px;">You can return to your cart and try again whenever you're ready.</p>

        <div class="result-card-actions">
            <a href="{{ url_for('shop.cart') }}" class="btn btn-primary">Return to Cart</a>
            <a href="{{ url_for('shop.catalogue') }}" class="btn btn-secondary">Continue Shopping</a>
        </div>
    </div>
</div>
{% endblock %}
