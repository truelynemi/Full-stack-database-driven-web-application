{% extends 'base_shop.html' %}

{% block title %}{{ product.name }} — Shop{% endblock %}

{% block content %}
<!-- ── Product detail ── -->
<div class="container">
    <a href="{{ url_for('shop.catalogue') }}" class="back-link">← Back to Shop</a>

    <div class="product-detail">
        <!-- Image -->
        <div class="product-detail-img-wrap">
            {% if product.image_url %}
            <img src="{{ product.image_url }}" alt="{{ product.name }}">
            {% else %}
            <div class="product-detail-img-placeholder">🛍️</div>
            {% endif %}
        </div>

        <!-- Info -->
        <div class="product-detail-info">
            <h1 class="product-detail-name">{{ product.name }}</h1>
            <div class="product-detail-price">£{{ "%.2f"|format(product.price / 100) }}</div>
            <p class="product-detail-desc">{{ product.description }}</p>
            <form action="{{ url_for('shop.add_to_cart', product_id=product.id) }}" method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button type="submit" class="btn btn-primary btn-lg">🛒 Add to Cart</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
